# Nginx config for qrobotics.sargeras.ru (HTTPS via Let's Encrypt)
# Place in /etc/nginx/sites-available/ and symlink to sites-enabled

# Redirect HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name qrobotics.sargeras.ru;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name qrobotics.sargeras.ru;

    # Let's Encrypt certificates (after running certbot)
    ssl_certificate     /etc/letsencrypt/live/qrobotics.sargeras.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qrobotics.sargeras.ru/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/qrobotics.sargeras.ru;
    index index.html;

    # SPA: all routes -> index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
